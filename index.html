<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pokédex 151</title>
<style>
*{box-sizing:border-box;}
body{font-family:Arial;text-align:center;background:#111;color:white;margin:0;padding:10px;}
.topbar{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
#grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;max-width:820px;margin:auto;}
@media(max-width:600px){#grid{grid-template-columns:repeat(6,1fr);}}
.cell{background:#222;padding:4px;border-radius:6px;font-size:10px;height:80px;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:transform 0.1s;}
.cell.found{background:#1e3a1e;cursor:pointer;}.cell.found:hover{transform:scale(1.08);}
.cell.shinyFound{background:#2a2a00;border:1px solid gold;}
.cell img{width:44px;height:44px;}
.cell .num{color:#666;font-size:9px;}
.cell .pname{font-size:9px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;}
.input-row{display:flex;justify-content:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
input{padding:8px;border-radius:6px;border:1px solid #444;background:#222;color:white;font-size:14px;width:200px;}
button{padding:7px 13px;cursor:pointer;border-radius:6px;border:1px solid #555;background:#333;color:white;font-size:13px;transition:background 0.15s;}
button:hover{background:#444;}button:disabled{opacity:0.35;cursor:default;}
.shiny-badge{color:gold;}
/* Overlay */
#overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:200;overflow-y:auto;padding:12px;}
#overlayBox{background:#1a1a1a;border-radius:14px;padding:20px;max-width:880px;margin:16px auto;text-align:center;}
/* Tabs dans overlay */
.tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid #444;}
.tab{padding:8px 16px;cursor:pointer;font-size:13px;color:#aaa;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:white;border-bottom-color:lime;}
.tab:hover{color:white;}
.tabContent{display:none;}.tabContent.active{display:block;}
/* Cartes sélection */
.selCard{background:#222;padding:7px;border-radius:8px;cursor:pointer;text-align:center;font-size:10px;border:2px solid transparent;transition:all 0.15s;}
.selCard.selected{border-color:lime;background:#1a2a1a;}
.selCard img{width:44px;}
/* Combat */
#battle{display:none;margin-top:20px;justify-content:center;gap:16px;flex-wrap:wrap;align-items:flex-start;}
.teamBox{background:#1a1a1a;padding:10px;border-radius:10px;width:240px;}
.activeCard{padding:10px;background:#222;border-radius:10px;border:2px solid #444;transition:all 0.3s;position:relative;overflow:hidden;}
.activeCard.hit-enemy{border-color:#f55;animation:shakeEnemy 0.35s;}
.activeCard.hit-player{border-color:#f55;animation:shakePlayer 0.35s;}
@keyframes shakeEnemy{0%,100%{transform:none}20%{transform:translateX(6px)}50%{transform:translateX(-5px)}80%{transform:translateX(3px)}}
@keyframes shakePlayer{0%,100%{transform:none}20%{transform:translateX(-6px)}50%{transform:translateX(5px)}80%{transform:translateX(-3px)}}
.activeCard.fainted-anim{animation:faintOut 0.6s forwards;}
@keyframes faintOut{0%{opacity:1;transform:none}60%{opacity:0.3;transform:translateY(8px) rotate(-3deg)}100%{opacity:0.15;transform:translateY(14px) rotate(-6deg);filter:grayscale(1)}}
/* Flash dégâts */
.dmg-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:#f550;pointer-events:none;border-radius:10px;animation:dmgFlash 0.4s forwards;}
@keyframes dmgFlash{0%{background:rgba(255,60,60,0.35)}100%{background:rgba(255,60,60,0)}}
/* HP bar */
.hpbar,.xpbar{width:100%;border-radius:4px;overflow:hidden;}
.hpbar{height:10px;background:#3a3a3a;margin-top:5px;}
.xpbar{height:5px;background:#2a2a2a;margin-top:3px;}
.hpfill{height:100%;transition:width 0.55s ease;}
.xpfill{height:100%;background:cyan;transition:width 0.55s;}
.green{background:limegreen;}.orange{background:orange;}.red{background:#e33;}
/* Pokéballs banc */
.bench-ball{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform 0.15s;position:relative;}
.bench-ball.alive{cursor:pointer;}.bench-ball.alive:hover{transform:scale(1.3);}
.bench-ball.fainted{opacity:0.2;filter:grayscale(1);cursor:default;}
.bench-ball.active-ball{outline:3px solid lime;outline-offset:2px;cursor:default;}
.bench-tooltip{display:none;position:absolute;bottom:38px;left:50%;transform:translateX(-50%);background:#333;border:1px solid #555;border-radius:6px;padding:5px 9px;font-size:10px;white-space:nowrap;z-index:10;pointer-events:none;text-align:center;}
.bench-ball:hover .bench-tooltip{display:block;}
/* Log */
#log{width:270px;background:#1a1a1a;padding:10px;height:440px;overflow-y:auto;border-radius:10px;text-align:left;font-size:12px;line-height:1.75;}
.logLine{padding:2px 0;border-bottom:1px solid #222;animation:fadeIn 0.3s;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.logLine.crit{color:#ff6;}.logLine.super{color:#6f6;}.logLine.miss{color:#888;}.logLine.xp{color:cyan;}.logLine.lvl{color:lime;}.logLine.evo{color:gold;}.logLine.ko{color:#f55;}
/* Attaques */
.atk-btn{margin:3px;font-size:11px;padding:6px 10px;border-radius:6px;transition:all 0.12s;display:inline-block;width:calc(50% - 8px);}
.atk-btn:hover{filter:brightness(1.2);transform:translateY(-1px);}
.atk-btn:active{transform:scale(0.93);}
.atk-btn:disabled{opacity:0.25;}
.tbadge{font-size:9px;padding:1px 6px;border-radius:4px;display:inline-block;margin-left:2px;font-weight:bold;}
/* Particules */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;}
.particle{position:absolute;border-radius:50%;animation:particleFly var(--dur,1s) ease-out forwards;}
@keyframes particleFly{0%{opacity:1;transform:scale(1) translate(0,0)}100%{opacity:0;transform:scale(0.2) translate(var(--tx,0),var(--ty,-120px))}}
/* Shiny overlay */
#shinyOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;pointer-events:none;}
/* Tableau moves */
.move-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;}
.move-table th{color:#888;font-weight:normal;padding:3px 5px;border-bottom:1px solid #333;text-align:left;}
.move-table td{padding:4px 5px;border-bottom:1px solid #2a2a2a;}
.move-table tr.learned{background:#1a2a1a;}
.move-table tr.active-move{background:#1a1a2a;}
.move-cb{cursor:pointer;width:14px;height:14px;}
@keyframes discoverPop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
/* Level up flash */
#lvlUpBanner{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#1a3a1a,#0a2a0a);border:2px solid lime;border-radius:14px;padding:18px 32px;font-size:20px;font-weight:bold;color:lime;z-index:500;animation:bannerPop 0.4s ease;pointer-events:none;}
@keyframes bannerPop{from{transform:translate(-50%,-50%) scale(0.6);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
#evoBanner{display:none;position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:500;pointer-events:none;}
</style>
</head>

// Retourne toutes les attaques apprises jusqu'au niveau donné
function allLearnedMoves(id,lvl){
  let pool=(MP[id]||[{n:"Charge",t:"normal",p:35,l:1}]).filter(m=>m.l<=lvl);
  if(!pool.length) pool=[{n:"Charge",t:"normal",p:35,l:1}];
  return pool;
}

// Retourne les 4 attaques actives (par défaut les 4 dernières apprises)
function defaultActiveMoves(id,lvl){
  let all=allLearnedMoves(id,lvl);
  return all.slice(-4).map(m=>m.n);
}

function norm(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function findId(v){
  v=v.trim();let n=parseInt(v);
  if(!isNaN(n)&&n>=1&&n<=151)return n;
  let l=norm(v);
  for(let i=0;i<names.length;i++)if(norm(names[i])===l)return i+1;
  return null;
}

function add(){
  let v=document.getElementById("input").value.trim(),id=findId(v);
  if(!id||found.includes(id)){
    document.getElementById("input").style.borderColor="#f55";
    setTimeout(()=>document.getElementById("input").style.borderColor="",800);
    return;
  }
  found.push(id);
  let isNewShiny=Math.random()<1/32;
  if(isNewShiny)shiny[id]=true;
  saveAll();render();
  document.getElementById("input").value="";
  // Animation découverte
  if(isNewShiny){
    setTimeout(()=>showShinyAnim(id,names[id-1]),200);
  } else {
    // Petite animation de découverte normale
    let cell=document.querySelector(`#grid .cell:nth-child(${id})`);
    if(cell){cell.style.animation="none";void cell.offsetWidth;cell.style.animation="discoverPop 0.5s ease";}
  }
}

function getSprite(id){return shiny[id]?`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${id}.png`:`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;}
function badge(t){let c=typeColor[t]||"#888";return `<span class="tbadge" style="background:${c}22;color:${c};border:1px solid ${c}44">${t}</span>`;}

function render(){
  let g=document.getElementById("grid");g.innerHTML="";
  for(let i=1;i<=151;i++){
    let d=document.createElement("div"),f=found.includes(i),s=f&&shiny[i];
    d.className="cell"+(s?" shinyFound":f?" found":"");
    d.innerHTML=f?`<img src="${getSprite(i)}" loading="lazy"><div class="num">#${i}</div><div class="pname">${names[i-1]}${s?'<span class="shiny-badge">★</span>':''}</div>`:`<div class="num">#${i}</div><div style="font-size:22px;color:#333">?</div>`;

function xpNeed(lvl){return Math.floor(25+lvl*lvl*0.9);}

function makePoke(id,lvl){
  lvl=Math.min(100,lvl||1);
  let t=ptype[id-1]||"normal";
  let mhp=Math.floor(40+lvl*6+(lvl>15?lvl*3:0));
  let activeNames=defaultActiveMoves(id,lvl);
  return {id,name:names[id-1],type:t,level:lvl,xp:0,xpNeed:xpNeed(lvl),maxHp:mhp,hp:mhp,activeMoves:activeNames};
}

// Obtenir les objets move complets depuis les noms actifs
function getActiveMoveObjs(p){
  let all=allLearnedMoves(p.id,p.level);
  return p.activeMoves.map(n=>all.find(m=>m.n===n)||{n,t:"normal",p:35,l:1});
}

  let cards=avail.map(id=>{

function switchTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById("tab-"+id).classList.add("active");

function renderMoveEditor(p){
  let all=allLearnedMoves(p.id,p.level);
  let rows=all.map(m=>{
    let active=p.activeMoves.includes(m.n);
    let c=typeColor[m.t]||"#999";
    return `<tr class="${active?"active-move":"learned"}">
      <td><input type="checkbox" class="move-cb" ${active?"checked":""} onchange="toggleMove(${p.id},'${m.n}',this)" ${!active&&p.activeMoves.length>=4?"disabled":""}></td>
      <td><b>${m.n}</b></td>
      <td>${badge(m.t)}</td>
      <td style="color:${m.p?c:"#666"}">${m.p||"—"}</td>
      <td style="color:#666">Lv.${m.l}</td>
    </tr>`;
  }).join("");

  return `<div style="margin-top:6px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <img src="${getSprite(p.id)}" style="width:50px">
      <div style="text-align:left">
        <div style="font-weight:bold">${p.name} ${badge(p.type)}</div>
        <div style="font-size:11px;color:#aaa">Lv.${p.level} · ${p.activeMoves.length}/4 attaques actives</div>
      </div>
    </div>
    <p style="font-size:11px;color:#888;margin:0 0 8px">Coche exactement 4 attaques à utiliser en combat.</p>
    <table class="move-table">
      <tr><th></th><th>Attaque</th><th>Type</th><th>Puis.</th><th>Apprise</th></tr>
      ${rows}
    </table>
  </div>`;
}

function toggleMove(id,moveName,cb){
  let p=roster.find(r=>r.id===id);
  if(!p)return;
  if(cb.checked){
    if(p.activeMoves.length>=4){cb.checked=false;return;}
    p.activeMoves.push(moveName);
  } else {
    if(p.activeMoves.length<=1){cb.checked=true;return;}
    p.activeMoves=p.activeMoves.filter(n=>n!==moveName);
  }
  // Mettre à jour disabled sur les autres cases
  let all=allLearnedMoves(p.id,p.level);
  let full=p.activeMoves.length>=4;
  all.forEach(m=>{
    // retrouver la checkbox
    // on rerender l'onglet plutôt
  });
  saveAll();
  // Rerender l'onglet
  document.getElementById(`content-p${id}`).innerHTML=renderMoveEditor(p);
}

function toggleSel(id){
  let i=teamSel.indexOf(id);
  if(i>=0){teamSel.splice(i,1);}
  else{if(teamSel.length>=3){alert("Max 3 !");return;}teamSel.push(id);}
  document.querySelectorAll("[id^='sc']").forEach(el=>{
    let sid=parseInt(el.id.slice(2));
    el.classList.toggle("selected",teamSel.includes(sid));
  });
}

function confirmTeam(){
  if(!teamSel.length){alert("Sélectionne au moins 1 Pokémon !");return;}
  let team=teamSel.map(id=>{
    let ex=roster.find(p=>p.id===id);
    let p=ex?JSON.parse(JSON.stringify(ex)):makePoke(id,1);
    p.hp=p.maxHp; // PV pleins
    return p;
  });
  hideOv();startBattle(team);
}

function spawnParticles(x,y,color,count=12){
  let c=document.getElementById("particles");
  for(let i=0;i<count;i++){
    let d=document.createElement("div");
    d.className="particle";
    let angle=Math.random()*Math.PI*2;
    let dist=50+Math.random()*80;
    d.style.cssText=`left:${x}px;top:${y}px;width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;background:${color};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist-60}px;--dur:${0.5+Math.random()*0.7}s;animation-delay:${Math.random()*0.15}s`;
    c.appendChild(d);
    setTimeout(()=>d.remove(),1200);
  }
}

function particlesAt(elId,color,count){
  let el=document.getElementById(elId);
  if(!el)return;
  let r=el.getBoundingClientRect();
  spawnParticles(r.left+r.width/2, r.top+r.height/2, color, count);
}

  let imgStyle=p.hp<=0?"filter:grayscale(1);opacity:0.25;transform:rotate(-10deg)":"";
  return `<div class="activeCard" id="${isEnemy?"enemyActiveCard":"playerActiveCard"}">
    <div style="display:flex;align-items:center;gap:8px">
      <img src="${getSprite(p.id)}" style="width:${isEnemy?56:48}px;transition:all 0.4s;${imgStyle}">
      <div style="flex:1;text-align:left">
        <div style="font-weight:bold;font-size:12px">${p.name} ${badge(p.type)}</div>
        <div style="font-size:10px;color:#aaa">Lv.<b>${p.level}</b> · <span style="color:${r>0.5?"#8f8":r>0.25?"#fa0":"#f55"}">${Math.max(0,p.hp)}</span>/${p.maxHp} PV</div>
      </div>
    </div>
    <div class="hpbar"><div class="hpfill ${hpCol(r)}" style="width:${Math.round(r*100)}%"></div></div>
    ${!isEnemy?`<div class="xpbar"><div class="xpfill" style="width:${Math.round(xr*100)}%"></div></div>`:""}
  </div>`;
}

function benchBallHtml(p,idx,isEnemy){
  let isActive=isEnemy?(idx===curE):(idx===curP);
  let alive=p.hp>0;
  let cls="bench-ball"+(isActive?" active-ball":alive?" alive":" fainted");
  let emoji=isActive?"🔴":alive?"⚪":"💀";
  let onclick="";
  if(!isEnemy&&!isActive&&alive&&!over&&!busy) onclick=`onclick="switchPokemon(${idx})"`;
  if(isEnemy&&!isActive&&alive&&!over&&!busy) onclick=`onclick="setTarget(${idx})"`;
  let hpPct=alive?Math.round(p.hp/p.maxHp*100):0;
  return `<div class="${cls}" ${onclick}>${emoji}<div class="bench-tooltip"><b>${p.name}</b><br>Lv.${p.level}<br>${Math.max(0,p.hp)}/${p.maxHp} PV (${hpPct}%)${isActive?" ▶":!alive?" K.O.":""}</div></div>`;
}

function renderBattle(){
  document.getElementById("playerActive").innerHTML=activeCardHtml(player[curP],false);
  document.getElementById("playerBench").innerHTML=player.map((p,i)=>benchBallHtml(p,i,false)).join("");
  document.getElementById("enemyActive").innerHTML=activeCardHtml(enemy[curE],true);
  document.getElementById("enemyBench").innerHTML=enemy.map((p,i)=>benchBallHtml(p,i,true)).join("");
  renderAtkZone();
}

function renderAtkZone(){
  let az=document.getElementById("atkZone");
  az.innerHTML="";
  if(over||busy) return;
  let p=player[curP];
  if(!p||p.hp<=0) return;
  let moves=getActiveMoveObjs(p);
  let ae=enemy[curE];
  let aeType=ptype[ae.id-1]||"normal";
  let hasSwitch=player.some((pk,i)=>i!==curP&&pk.hp>0);
  let switchBtn=hasSwitch
    ?`<button onclick="openSwitchMenu()" style="margin-top:7px;width:100%;background:#1a1a2a;border-color:#448;font-size:11px">🔄 Switch <span style="color:#777;font-size:10px">(passe le tour)</span></button>`:"";
  let btns=moves.map((m,i)=>{
    let c=typeColor[m.t]||"#999";
    let eff=multi(m.t,aeType);
    let effHint=eff>=2?` <span style="color:lime;font-size:9px">▲▲</span>`:eff===0?` <span style="color:#f55;font-size:9px">✗</span>`:eff<1?` <span style="color:#fa0;font-size:9px">▼</span>`:"";
    return `<button class="atk-btn" style="border-color:${c}55;color:${c};background:#181818" onclick="doAtk(${i})"><b>${m.n}</b>${badge(m.t)}<br><span style="font-size:9px;color:#666">${m.p||"—"} pwr${effHint}</span></button>`;
  }).join("");
  az.innerHTML=`<div style="font-size:10px;color:#f88;margin-bottom:5px">🎯 <b style="color:white">${ae.name}</b> · clic ⚪ ennemi pour changer cible</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">${btns}</div>${switchBtn}`;
}

function setTarget(idx){
  if(over||busy||enemy[idx].hp<=0) return;
  curE=idx;
  xpContribs[curE].add(curP);
  logB(`🎯 Cible : <b>${enemy[idx].name}</b>`,"");
  renderBattle();
}

function openSwitchMenu(){
  if(over||busy) return;
  let ae=enemy[curE];
  let choices=player.map((p,i)=>{
    if(i===curP||p.hp<=0) return "";
    let aeT=ptype[ae.id-1]||"normal";
    let pT=ptype[p.id-1]||"normal";
    // Indicateur si ce pokémon résiste ou est fort contre la cible
    let defScore=multi(aeT,pT); // l'ennemi est efficace contre nous?
    let hint=defScore>=2?`<span style="color:#f55;font-size:9px">⚠️ faible</span>`:defScore<1?`<span style="color:lime;font-size:9px">✓ résiste</span>`:"";
    return `<div class="selCard" onclick="switchPokemon(${i})" style="display:inline-block;margin:5px;width:105px;vertical-align:top">
      <img src="${getSprite(p.id)}" style="width:40px"><br><b>${p.name}</b><br>${badge(ptype[p.id-1]||"normal")}<br>
      <span style="color:lime;font-size:10px">Lv.${p.level} · ${p.hp}/${p.maxHp}PV</span><br>${hint}</div>`;
  }).join("");
  document.getElementById("atkZone").innerHTML=`
    <div style="font-size:11px;color:#fa0;margin-bottom:6px">⚠️ L'ennemi attaque pendant le switch !</div>
    <div>${choices}</div>
    <button onclick="renderAtkZone()" style="margin-top:6px;font-size:11px">Annuler</button>`;
}

function switchPokemon(idx){
  if(over||busy||player[idx].hp<=0||idx===curP) return;
  busy=true;
  syncRoster(player[curP]);
  let oldName=player[curP].name;
  curP=idx;
  xpContribs[curE].add(curP); // enregistrer contribution XP
  logB(`↩️ <b>${oldName}</b> au repos. <b>${player[curP].name}</b> entre en combat !`,"");
  renderBattle();
  setTimeout(()=>enemyAttacks(()=>{busy=false;renderBattle();}), DELAY_ATK);
}

function disableAtks(){
  busy=true;
  document.getElementById("atkZone").querySelectorAll("button").forEach(b=>b.disabled=true);
}

function doAtk(mi){
  if(over||busy) return;
  disableAtks();
  xpContribs[curE].add(curP);
  let p=player[curP], e=enemy[curE];
  let move=getActiveMoveObjs(p)[mi];
  let eType=ptype[e.id-1]||"normal";
  if(move.p>0){
    let{d,m,crit}=calcDmg(move,p.level,eType,ptype[p.id-1]||"normal");
    e.hp=Math.max(0,e.hp-d);
    let critTxt=crit?` <b style='color:#ff6'>CRITIQUE !</b>`:"";
    let cls=crit?"crit":m>=2?"super":m===0?"miss":"";
    logB(`${p.name} → <b>${move.n}</b>${badge(move.t)} : <b>${d}</b> dégâts${effTxt(m)}${critTxt}`,cls);
    flashCard("enemyActiveCard",true);
    particlesAt("enemyActiveCard", m>=2?"#6f6":crit?"#ff6":"#f55", m>=2?16:crit?14:8);
  } else {
    logB(`${p.name} utilise <b>${move.n}</b>`,"");
  }
  renderBattle();

  if(e.hp<=0){
    setTimeout(()=>handleEnemyKO(e,()=>{
      if(enemy.every(x=>x.hp<=0)){onVictory();return;}
      busy=false; renderBattle();
    }), DELAY_KO);
    return;
  }
  setTimeout(()=>enemyAttacks(()=>{busy=false;renderBattle();}), DELAY_ATK);
}

// ─── IA ENNEMIE ───────────────────────────────
// L'IA choisit la meilleure attaque selon les types
function aiChooseMove(ae){
  let moves=getActiveMoveObjs(ae);
  let pType=ptype[player[curP].id-1]||"normal";
  let scored=moves.map((m,i)=>{
    if(!m.p) return {i,score:-1}; // Pas les attaques de statut en priorité
    let m_eff=multi(m.t,pType);
    // STAB bonus
    let stab=(m.t===ptype[ae.id-1]||"normal")?1.2:1;
    let score=m.p*m_eff*stab;
    return {i,score};
  });
  // Trier par score décroissant
  scored.sort((a,b)=>b.score-a.score);
  // 70% meilleur coup, 20% deuxième, 10% aléatoire
  let r=Math.random();
  if(r<0.70&&scored.length>0) return scored[0].i;
  if(r<0.90&&scored.length>1) return scored[1].i;
  return scored[Math.floor(Math.random()*scored.length)].i;
}

// L'IA choisit si elle devrait switcher (basé sur désavantage de type)
function aiShouldSwitch(ae){
  // Pas de switch implémenté côté ennemi pour simplifier (ils ont 1 pokémon actif à la fois)
  return false;
}

function enemyAttacks(cb){
  if(enemy[curE].hp<=0){
    let next=enemy.findIndex(e=>e.hp>0);
    if(next<0){cb();return;}
    curE=next;
    logB(`⚔️ L'ennemi envoie <b>${enemy[curE].name}</b> !`,"");
    xpContribs[curE].add(curP);
    renderBattle();
  }
  let ae=enemy[curE], p=player[curP];
  let pType=ptype[p.id-1]||"normal";
  let mi=aiChooseMove(ae);
  let em=getActiveMoveObjs(ae)[mi];
  if(em.p>0){
    let{d,m,crit}=calcDmg(em,ae.level,pType,ptype[ae.id-1]||"normal");
    p.hp=Math.max(0,p.hp-d);
    let critTxt=crit?` <b style='color:#ff6'>CRITIQUE !</b>`:"";
    logB(`${ae.name} → <b>${em.n}</b>${badge(em.t)} : <b>${d}</b> dégâts${effTxt(m)}${critTxt}`,crit?"crit":"");
    flashCard("playerActiveCard",false);
    particlesAt("playerActiveCard","#f55",8);
  } else {
    logB(`${ae.name} utilise <b>${em.n}</b>`,"");
  }
  renderBattle();
  syncRoster(p); saveAll();
  if(p.hp<=0){
    setTimeout(()=>{
      logB(`💀 <b>${p.name}</b> K.O. !`,"ko");
      syncRoster(p); renderBattle();
      if(player.every(x=>x.hp<=0)){onDefeat();return;}
      openForcedSwitch(cb);
    }, DELAY_KO);
  } else { cb(); }
}

// ─── XP PARTAGÉ ──────────────────────────────
function giveSharedXP(e, eIdx){
  let contributors=[...xpContribs[eIdx]].filter(i=>player[i]&&player[i].hp>0);
  if(!contributors.length) contributors=[curP]; // fallback
  let totalXp=Math.floor(10+e.level*2.5);
  let xpEach=Math.max(1,Math.floor(totalXp/contributors.length));
  contributors.forEach(pi=>{
    let p=player[pi];
    if(p.level>=100) return;
    p.xp+=xpEach;
    logB(`<span>+${xpEach} XP → <b>${p.name}</b>${contributors.length>1?" (partagé)":""}</span>`,"xp");
    while(p.xp>=p.xpNeed&&p.level<100){
      p.xp-=p.xpNeed; p.level++; p.xpNeed=xpNeed(p.level);
      let mhp=Math.floor(40+p.level*6+(p.level>15?p.level*3:0));
      p.maxHp=mhp; p.hp=Math.min(p.hp+15,mhp);
      let newM=allLearnedMoves(p.id,p.level).filter(m=>m.l===p.level);
      newM.forEach(nm=>{
        logB(`📖 <b>${p.name}</b> apprend <b>${nm.n}</b> !`,"lvl");
        if(p.activeMoves.length<4&&!p.activeMoves.includes(nm.n)) p.activeMoves.push(nm.n);
      });
      logB(`⬆️ <b>${p.name}</b> Lv. <b>${p.level}</b> !`,"lvl");
      if(pi===curP) showLvlBanner(p.name,p.level);
      let ev=evolutions[p.id];
      if(ev&&(ev.l===null||p.level>=ev.l)){
        let old=p.name, oldId=p.id;
        p.id=ev.to; p.name=names[p.id-1]; p.type=ptype[p.id-1]||p.type;
        p.activeMoves=defaultActiveMoves(p.id,p.level);
        logB(`✨ <b>${old}</b> évolue en <b>${p.name}</b> !`,"evo");
        if(!found.includes(p.id)) found.push(p.id);
        if(pi===curP) setTimeout(()=>showEvoBanner(old,p.name,p.id),400);
      }
    }
    if(p.level>=100){p.xp=0; logB(`🏅 <b>${p.name}</b> Lv.MAX !`,"evo");}
    syncRoster(p);
  });
}

function handleEnemyKO(e,cb){
  logB(`💥 <b>${e.name}</b> K.O. !`,"ko");
  let eIdx=enemy.indexOf(e);
  giveSharedXP(e,eIdx>=0?eIdx:curE);
  let next=enemy.findIndex(x=>x.hp>0);
  if(next>=0){ curE=next; logB(`⚔️ L'ennemi envoie <b>${enemy[curE].name}</b> !`,""); xpContribs[curE].add(curP); }
  renderBattle();
  cb();
}

function openForcedSwitch(cb){
  let alive=player.filter((p,i)=>i!==curP&&p.hp>0);
  if(!alive.length){onDefeat();return;}
  let ae=enemy[curE];
  let choices=player.map((p,i)=>{
    if(p.hp<=0) return "";
    let pT=ptype[p.id-1]||"normal";
    let aeT=ptype[ae.id-1]||"normal";
    let defScore=multi(aeT,pT);
    let hint=defScore>=2?`<br><span style="color:#f55;font-size:9px">⚠️ faible face à ${ae.name}</span>`:defScore<1?`<br><span style="color:lime;font-size:9px">✓ résiste à ${ae.name}</span>`:"";
    return `<div class="selCard" onclick="forcedSwitch(${i})" style="display:inline-block;margin:5px;width:105px;vertical-align:top">
      <img src="${getSprite(p.id)}" style="width:40px"><br><b>${p.name}</b><br>${badge(ptype[p.id-1]||"normal")}<br>
      <span style="color:lime;font-size:10px">Lv.${p.level} · ${p.hp}/${p.maxHp}PV</span>${hint}</div>`;
  }).join("");
  document.getElementById("atkZone").innerHTML=`
    <div style="font-size:12px;color:#f55;font-weight:bold;margin-bottom:8px">💀 ${player[curP].name} K.O. — Choisis le suivant !</div>
    <div>${choices}</div>`;
  window._switchCb=cb;
}

function forcedSwitch(idx){
  curP=idx;
  xpContribs[curE].add(curP);
  logB(`<b>${player[curP].name}</b> entre en combat !`,"");
  renderBattle();
  if(window._switchCb){window._switchCb();window._switchCb=null;}
}

// ─── Victoire / Défaite ───────────────────────
function onVictory(){
  over=true; wins++; saveAll(); render();
  logB(`🏆 <b>Victoire ! Combat ${wins} !</b>`,"evo");
  particlesAt("enemyActiveCard","gold",25);
  setTimeout(()=>{
    let choix=enemy.map((e,i)=>`
      <div class="selCard" onclick="captureEnemy(${i})" style="display:inline-block;margin:6px;width:110px;vertical-align:top">
        <img src="${getSprite(e.id)}" style="width:50px"><br><b>${e.name}</b><br>${badge(ptype[e.id-1]||"normal")}<br>
        <span style="color:#aaa;font-size:10px">Lv.${e.level}</span></div>`).join("");
    showOv(`<h2>🏆 Victoire !</h2><p style="color:#aaa">Choisis le Pokémon à capturer :</p><div>${choix}</div><div style="margin-top:14px"><button onclick="skipCap()">Passer</button></div>`);
  },600);
}

function captureEnemy(i){
  let e=enemy[i];
  if(roster.length>=6){showOv(`<h2>Roster plein (6/6)</h2><p>Libère un Pokémon :</p>${rosterManageHtml(e.id,e.level)}`);}
  else doCapture(e);
}
function doCapture(e){
  if(!found.includes(e.id)) found.push(e.id);
  let np=makePoke(e.id,e.level);
  let idx=roster.findIndex(r=>r.id===e.id);
  if(idx>=0) roster[idx]=np; else roster.push(np);
  logB(`➕ <b>${e.name}</b> Lv.${e.level} capturé !`,"lvl");
  saveAll(); render(); hideOv(); postBtns();
}
function rosterManageHtml(cid,clvl){
  return `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px">
  ${roster.map((p,i)=>`<div class="selCard" style="width:100px">
    <img src="${getSprite(p.id)}" style="width:38px"><br><b>${p.name}</b><br>Lv.${p.level}<br>
    <button style="font-size:10px;margin-top:5px;padding:3px 8px" onclick="releaseFor(${i},${cid},${clvl})">Libérer</button>
  </div>`).join("")}
  </div><div style="margin-top:12px"><button onclick="skipCap()">Annuler</button></div>`;
}
function releaseFor(ri,cid,clvl){logB(`🔓 ${roster[ri].name} libéré.`,"");roster.splice(ri,1);doCapture({id:cid,level:clvl,name:names[cid-1]});}
function skipCap(){hideOv();postBtns();}

function onDefeat(){
  over=true;
  logB(`😞 <b>Défaite !</b>`,"ko");
  if(!roster.length){postBtns();return;}
  let li=Math.floor(Math.random()*roster.length), lost=roster[li];
  roster.splice(li,1);
  logB(`💔 <b>${lost.name}</b> capturé par l'ennemi !`,"ko");
  saveAll(); render();
  showOv(`<h2>😞 Défaite</h2><p><b>${lost.name}</b> t'a été volé !</p><img src="${getSprite(lost.id)}" style="width:70px;filter:grayscale(1);opacity:0.4"><br><button style="margin-top:14px" onclick="hideOv();postBtns()">OK</button>`);
}

function postBtns(){
  document.getElementById("atkZone").innerHTML=`
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">
      <button onclick="openTeamSelect()">🔄 Changer équipe / attaques</button>
      <button onclick="replayTeam()">⚔️ Recombattre (même équipe)</button>
    </div>`;
}
function replayTeam(){
  if(!teamSel.length){openTeamSelect();return;}
  let team=teamSel.map(id=>{
    let ex=roster.find(p=>p.id===id);
    let p=ex?JSON.parse(JSON.stringify(ex)):makePoke(id,1);
    p.hp=p.maxHp; return p;
  });
  startBattle(team);
}
function hideBattle(){document.getElementById("battle").style.display="none";}

// ─── Helpers ──────────────────────────────────
function logB(t,cls=""){
  let l=document.getElementById("log");
  let d=document.createElement("div");
  d.className="logLine"+(cls?" "+cls:""); d.innerHTML=t;
  l.appendChild(d); l.scrollTop=9999;
}
// Garder 'log' comme alias pour la compatibilité
function log(t){logB(t,"");}

function effTxt(m){return m>=2?" <b style='color:lime'>Super efficace!</b>":m===0?" <b style='color:#f55'>Aucun effet</b>":m<1?" <i style='color:#fa0'>Peu efficace…</i>":"";}

function calcDmg(move,atkLvl,defType,atkType){
  if(!move.p)return{d:0,m:1,crit:false};
  let m=multi(move.t,defType);
  // STAB : bonus si le type d'attaque correspond au type du pokémon
  let stab=(move.t===atkType)?1.5:1;
  // Critique : 6.25%
  let crit=Math.random()<0.0625;
  let critMult=crit?1.5:1;
  let rand=0.85+Math.random()*0.15;
  let d=Math.max(1,Math.floor((move.p*0.28+atkLvl*1.6)*m*stab*critMult*rand));
  return{d,m,crit};
}
function syncRoster(p){
  let i=roster.findIndex(r=>r.id===p.id);
  let c=JSON.parse(JSON.stringify(p));
  if(i>=0)roster[i]=c; else if(roster.length<6)roster.push(c);
}

render();
</script>
